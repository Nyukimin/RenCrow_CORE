services:
  # ─────────────────────────────────────────────
  # RenCrow Agent (one-shot query)
  #   docker compose run --rm rencrow-agent -m "Hello"
  # ─────────────────────────────────────────────
  rencrow-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rencrow-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/root/.rencrow/config.json:ro
      - rencrow-workspace:/root/.rencrow/workspace
    entrypoint: ["rencrow", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # RenCrow Gateway (Long-running Bot)
  #   docker compose up rencrow-gateway
  # ─────────────────────────────────────────────
  rencrow-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rencrow-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/root/.rencrow/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - rencrow-workspace:/root/.rencrow/workspace
    command: ["gateway"]

volumes:
  rencrow-workspace:
