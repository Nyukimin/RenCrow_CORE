version: "2"

linters:
  enable:
    - errcheck      # エラーチェック漏れ
    - govet         # 疑わしいコード構造
    - staticcheck   # 静的解析（gosimple 相当を含む）
    - unused        # 未使用コード検出
    - ineffassign   # 無駄な代入
    - goconst       # 定数化可能な文字列
    - misspell      # スペルチェック
    - unconvert     # 不要な型変換
    - unparam       # 未使用パラメータ
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
    govet:
      enable:
        - shadow
    staticcheck:
      checks: ["all"]
  exclusions:
    paths:
      - vendor
      - .serena
      - docs
      - workspace

formatters:
  enable:
    - gofmt         # フォーマット確認
    - goimports     # import 整理

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
