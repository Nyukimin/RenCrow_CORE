name: Public Docs Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce public docs allowlist
        shell: bash
        run: |
          set -euo pipefail
          git -c core.quotepath=false ls-files docs | LC_ALL=C sort > /tmp/tracked-docs.txt
          LC_ALL=C sort .public-docs-allowlist > /tmp/allowed-docs.txt
          if ! diff -u /tmp/allowed-docs.txt /tmp/tracked-docs.txt; then
            echo "Tracked docs must exactly match .public-docs-allowlist" >&2
            exit 1
          fi
      - name: Reject local paths and private network addresses
        shell: bash
        run: |
          set -euo pipefail
          if rg -n '/home/[^/<[:space:]]+|C:\\Users\\[^\\<[:space:]]+|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' README.md ROADMAP.md CONTRIBUTING.md SECURITY.md docs; then
            echo "Machine-local path or private network address found in public docs" >&2
            exit 1
          fi
      - name: Reject likely embedded secrets
        shell: bash
        run: |
          set -euo pipefail
          if rg -n --pcre2 '(?i)(api[_-]?key|token|secret|password)\s*[:=]\s*\S{20,}' README.md ROADMAP.md CONTRIBUTING.md SECURITY.md docs; then
            echo "Likely embedded secret found in public docs" >&2
            exit 1
          fi
      - name: Enforce active instruction source-of-truth references
        shell: bash
        run: |
          set -euo pipefail
          retired='docs/(00_ドキュメント分類一覧|02_正本仕様|02_OpenClaw移植詳細仕様|02_v2統合分割仕様|03_設計文書|04_実装仕様_機能拡張|05_LLM運用プロンプト設計|06_実装ガイド進行管理|LLM運用|コーディング|refs|tooling)(/|\.md|`)'
          if rg -n "$retired" AGENTS.md CLAUDE.md rules; then
            echo "Active instructions must reference docs/README.md and docs/01-09 only" >&2
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          import re

          allowed = {
              line.strip()
              for line in Path(".public-docs-allowlist").read_text(encoding="utf-8").splitlines()
              if line.strip()
          }
          sources = [Path("AGENTS.md"), Path("CLAUDE.md")]
          sources.extend(Path("rules").rglob("*.md"))
          failures = []
          for source in sources:
              text = source.read_text(encoding="utf-8")
              for target in re.findall(r"`(docs/[^`]+\.md)`", text):
                  if target not in allowed:
                      failures.append(f"{source}: non-canonical docs reference {target}")
          if failures:
              raise SystemExit("\n".join(failures))
          PY
      - name: Check relative Markdown links
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          roots = [
              Path("README.md"),
              Path("ROADMAP.md"),
              Path("CONTRIBUTING.md"),
              Path("SECURITY.md"),
              Path("AGENTS.md"),
              Path("CLAUDE.md"),
          ]
          roots.extend(Path("docs").glob("*.md"))
          roots.extend(Path("rules").rglob("*.md"))
          failures = []
          for source in roots:
              text = source.read_text(encoding="utf-8")
              for target in re.findall(r"(?<!!)\[[^]]*\]\(([^)]+)\)", text):
                  target = target.split("#", 1)[0]
                  if not target or "://" in target or target.startswith("mailto:"):
                      continue
                  resolved = (source.parent / target).resolve()
                  if not resolved.exists():
                      failures.append(f"{source}: missing {target}")
          if failures:
              print("\n".join(failures), file=sys.stderr)
              raise SystemExit(1)
          PY
