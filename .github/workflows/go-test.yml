name: Go Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  representative-tests:
    name: Representative Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Module contracts
        run: go test ./modules/...

      - name: Composition, features, Viewer adapter
        run: go test ./cmd/picoclaw ./internal/features/... ./internal/adapter/viewer ./modules/...
