<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mio — Transparent</title>
<style>
  :root{ --chroma:#00FF00; }
  body.green{background:var(--chroma) !important}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  :root{ --mio-fit-scale:1; }
  body{
    background:transparent;
    overflow:hidden;
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  }

  .stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
  }
  .scene{
    position:relative;
    width:min(100vmin,900px);
    aspect-ratio:1/1;
    will-change:transform;
    transform-style:preserve-3d;
  }
  .layers{
    position:absolute;inset:0;
    will-change:transform;
    transform-origin:center bottom;
  }
  .layers img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:contain;
    opacity:0;
    z-index:0;
    transition:opacity .3s ease;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  .layers img.active{opacity:1;z-index:1}
  .layers img.entering{opacity:1;z-index:2}

  /* ---------- control panel (auto-hides; keyed out is not needed — it hides itself) ---------- */
  .panel{
    position:fixed;left:50%;bottom:18px;
    transform:translateX(-50%);
    background:rgba(10,9,18,.92);
    border:1px solid rgba(182,196,255,.35);
    border-radius:14px;
    padding:12px 14px;
    color:#f4f1ff;
    transition:opacity .4s, visibility .4s;
    max-width:min(92vw,560px);
  }
  .panel.hidden{opacity:0;visibility:hidden}
  .row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .row + .row{margin-top:8px}
  .panel button{
    appearance:none;
    border:1px solid rgba(182,196,255,.3);
    background:rgba(255,255,255,.04);
    color:#f4f1ff;
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    cursor:pointer;
    transition:all .2s;
  }
  .panel button:hover{border-color:#B6C4FF}
  .panel button:focus-visible{outline:2px solid #7CC8FF;outline-offset:1px}
  .panel button.on{
    border-color:#c9a96a;
    background:rgba(182,196,255,.18);
  }
  .panel .key{
    opacity:.5;font-size:10px;margin-left:4px;
  }
  .panel .note{
    margin-top:8px;text-align:center;
    font-size:10px;letter-spacing:.08em;color:rgba(244,241,255,.5);
  }

  @media (prefers-reduced-motion:reduce){
    .layers img{transition:opacity .15s linear}
  }
</style>
</head>

<div class="panel" id="panel">
  <div class="row" id="exprRow">
    <button data-key="serious" class="on">真剣<span class="key">1</span></button>
    <button data-key="smile">微笑み<span class="key">2</span></button>
    <button data-key="laugh">笑顔<span class="key">3</span></button>
    <button data-key="wink">ウィンク<span class="key">4</span></button>
    <button data-key="surprise">驚き<span class="key">5</span></button>
    <button data-key="shy">照れ<span class="key">6</span></button>
    <button data-key="sad">悲しみ<span class="key">7</span></button>
    <button data-key="trouble">困り顔<span class="key">8</span></button>
  </div>
  <div class="row">
    <button id="followToggle" class="on">視線追従<span class="key">F</span></button>
    <button id="breathToggle" class="on">呼吸<span class="key">B</span></button>
    <button id="autoToggle">おまかせ<span class="key">A</span></button>
    <button id="greenToggle">緑背景<span class="key">G</span></button>
    <button id="hideBtn">パネルを隠す<span class="key">H</span></button>
  </div>
  <div class="note">数秒操作がないと自動で隠れます ◆ キー操作はパネル非表示でも有効</div>
</div>

<script>
(function(){
  const stage  = document.getElementById('stage');
  const scene  = document.getElementById('scene');
  const layers = document.getElementById('layers');
  const panel  = document.getElementById('panel');
  const imgs   = Array.from(layers.querySelectorAll('img'));
  const btns   = Array.from(document.querySelectorAll('#exprRow button'));
  const keys   = imgs.map(i => i.dataset.key);

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let current = 'serious';
  let follow  = !reduceMotion;
  let breathe = !reduceMotion;
  let auto    = false;
  let autoTimer = null;
  let reacting = false;

  // ---------- expression (fade-in-on-top so the chroma green never bleeds through) ----------
  function setExpr(key, fromAuto){
    if(!keys.includes(key) || key === current) return;
    const prev = imgs.find(i => i.dataset.key === current);
    const next = imgs.find(i => i.dataset.key === key);
    current = key;
    next.classList.add('entering');
    setTimeout(() => {
      next.classList.remove('entering');
      next.classList.add('active');
      if(prev) prev.classList.remove('active');
    }, 320);
    btns.forEach(b => b.classList.toggle('on', b.dataset.key === key));
    if(!fromAuto && auto) restartAuto();
  }

  document.getElementById('exprRow').addEventListener('click', e => {
    const b = e.target.closest('button');
    if(b) setExpr(b.dataset.key);
  });

  // ---------- pointer follow ----------
  let tx = 0, ty = 0, cx = 0, cy = 0;
  window.addEventListener('mousemove', e => {
    if(!follow) return;
    tx = (e.clientX / window.innerWidth  - .5) * 2;
    ty = (e.clientY / window.innerHeight - .5) * 2;
    showPanel();
  });
  window.addEventListener('touchmove', e => {
    if(follow && e.touches[0]){
      tx = (e.touches[0].clientX / window.innerWidth  - .5) * 2;
      ty = (e.touches[0].clientY / window.innerHeight - .5) * 2;
    }
  }, {passive:true});

  // ---------- tap reaction ----------
  stage.addEventListener('click', () => {
    if(reacting) return;
    reacting = true;
    const prev = current;
    const pool = ['surprise','shy','wink'].filter(k => k !== prev);
    setExpr(pool[Math.floor(Math.random() * pool.length)], true);
    setTimeout(() => { setExpr(prev, true); reacting = false; }, 1100);
  });

  // ---------- animation loop ----------
  let t = 0, last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now; t += dt;
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    const swayX   = breathe ? Math.sin(t * 0.55) * 0.35 : 0;
    const breathY = breathe ? Math.sin(t * 1.15) * 0.45 : 0;
    const breathS = breathe ? 1 + Math.sin(t * 1.15) * 0.0035 : 1;
    scene.style.transform =
      'perspective(900px) rotateY(' + (cx * 5) + 'deg) rotateX(' + (-cy * 3.5) + 'deg)';
    const fitScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--mio-fit-scale')) || 1;
    layers.style.transform =
      'translate(' + (cx * 8 + swayX) + 'px,' + (cy * 6 + breathY) + 'px) scale(' + (breathS * fitScale) + ')';
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- auto mode ----------
  function restartAuto(){
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
      if(reacting) return;
      const pool = keys.filter(k => k !== current);
      setExpr(pool[Math.floor(Math.random() * pool.length)], true);
    }, 3800);
  }

  // ---------- toggles ----------
  function refreshToggle(id, state){
    const el = document.getElementById(id);
    el.classList.toggle('on', state);
    el.setAttribute('aria-pressed', String(state));
  }
  function toggleFollow(){ follow = !follow; if(!follow){ tx = 0; ty = 0; } refreshToggle('followToggle', follow); }
  function toggleBreath(){ breathe = !breathe; refreshToggle('breathToggle', breathe); }
  function toggleAuto(){
    auto = !auto;
    if(auto) restartAuto(); else clearInterval(autoTimer);
    refreshToggle('autoToggle', auto);
  }
  document.getElementById('followToggle').addEventListener('click', toggleFollow);
  document.getElementById('breathToggle').addEventListener('click', toggleBreath);
  document.getElementById('autoToggle').addEventListener('click', toggleAuto);
  refreshToggle('followToggle', follow);
  refreshToggle('breathToggle', breathe);

  // ---------- panel show / auto-hide ----------
  let hideTimer = null;
  let panelLocked = false; // user pressed H → stays hidden until H again
  function showPanel(){
    if(panelLocked) return;
    panel.classList.remove('hidden');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => panel.classList.add('hidden'), 4000);
  }
  function togglePanelLock(){
    panelLocked = !panelLocked;
    if(panelLocked){ panel.classList.add('hidden'); }
    else { showPanel(); }
  }
  function toggleGreen(){
    document.body.classList.toggle('green');
    document.getElementById('greenToggle').classList.toggle('on', document.body.classList.contains('green'));
  }
  document.getElementById('greenToggle').addEventListener('click', e => { e.stopPropagation(); toggleGreen(); });
  document.getElementById('hideBtn').addEventListener('click', e => {
    e.stopPropagation();
    togglePanelLock();
  });
  panel.addEventListener('mousemove', e => e.stopPropagation());
  panel.addEventListener('click', e => e.stopPropagation());
  showPanel();

  // ---------- keyboard ----------
  window.addEventListener('keydown', e => {
    const order = ['serious','smile','laugh','wink','surprise','shy','sad','trouble'];
    const n = parseInt(e.key, 10);
    if(n >= 1 && n <= 8){ setExpr(order[n-1]); return; }
    const k = e.key.toLowerCase();
    if(k === 'f') toggleFollow();
    if(k === 'b') toggleBreath();
    if(k === 'a') toggleAuto();
    if(k === 'h') togglePanelLock();
    if(k === 'g') toggleGreen();
  });
})();
</script>
</body>
</html>
