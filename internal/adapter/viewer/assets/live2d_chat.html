<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenCrow Live2D Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: white;
        }

        /* Live2D Character Panel */
        .character-panel {
            flex: 0 0 400px;
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            border-right: 2px solid #dee2e6;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .character-panel.live-mode {
            flex: 0 0 600px;
        }

        .character-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #live2d-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        .character-controls {
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #dee2e6;
        }

        .character-select {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .character-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #dee2e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .character-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .mode-btn.active {
            background: #28a745;
            color: white;
        }

        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .emotion-indicator {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #dee2e6;
        }

        .message-time {
            font-size: 0.75em;
            opacity: 0.6;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 24px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            padding: 12px 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.05);
        }

        #send-btn:active {
            transform: scale(0.95);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .character-panel {
                flex: 0 0 250px;
                border-right: none;
                border-bottom: 2px solid #dee2e6;
            }

            .character-panel.live-mode {
                flex: 0 0 350px;
            }

            .message-content {
                max-width: 85%;
            }
        }

        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s infinite;
            margin: 0 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Character Panel -->
        <div class="character-panel" id="character-panel">
            <div class="character-container">
                <iframe id="live2d-frame" src="" allowtransparency="true"></iframe>
            </div>
            <div class="character-controls">
                <div class="character-select">
                    <button class="character-btn active" data-character="mio">Mio</button>
                    <button class="character-btn" data-character="shiro">Shiro</button>
                </div>
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="normal">通常</button>
                    <button class="mode-btn" data-mode="live">ライブ</button>
                </div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <div class="chat-header">
                <h1>RenCrow Chat</h1>
                <div class="emotion-indicator">感情: <span id="current-emotion">normal</span></div>
            </div>

            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-content">
                        こんにちは！何かお手伝いできることはありますか？
                    </div>
                    <div class="message-time">just now</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="message-input" placeholder="メッセージを入力..." />
                    <button id="send-btn">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCharacter = 'mio';
        let currentMode = 'normal';
        let currentEmotion = 'normal';

        // Emotion state mapping (matches backend)
        const emotionStateMapping = {
            'normal':   { motion: '', expression: 'f01' },
            'happy':    { motion: 'tapBody', expression: 'f02' },
            'sad':      { motion: '', expression: 'f03' },
            'angry':    { motion: 'shake', expression: 'f04' },
            'surprise': { motion: 'pinchIn', expression: 'f05' },
            'think':    { motion: '', expression: 'f06' },
            'speaking': { motion: 'tapBody', expression: 'f02' }
        };

        // Initialize Live2D frame
        function updateLive2D() {
            const frame = document.getElementById('live2d-frame');
            const url = `/viewer/live2d/embed?character_id=${currentCharacter}&emotion=${currentEmotion}&mode=${currentMode}`;
            frame.src = url;
        }

        // Update emotion without reloading frame
        function setEmotion(emotion) {
            console.log('[Chat] Setting emotion:', emotion);
            currentEmotion = emotion;
            document.getElementById('current-emotion').textContent = emotion;

            // Get emotion state
            const state = emotionStateMapping[emotion] || emotionStateMapping['normal'];

            // Send to Live2D embed iframe
            const frame = document.getElementById('live2d-frame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({
                    type: 'emotion',
                    emotion: emotion,
                    state: state
                }, '*');
                console.log('[Chat] Sent emotion to Live2D:', emotion, state);
            }
        }

        // Character selection
        document.querySelectorAll('.character-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.character-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCharacter = btn.dataset.character;
                updateLive2D();
            });
        });

        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;

                const panel = document.getElementById('character-panel');
                if (currentMode === 'live') {
                    panel.classList.add('live-mode');
                } else {
                    panel.classList.remove('live-mode');
                }

                updateLive2D();
            });
        });

        // Add message to chat
        function addMessage(content, role) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesDiv.appendChild(messageDiv);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="message-content"><span class="loading"></span><span class="loading"></span><span class="loading"></span></div>';
            document.getElementById('messages').appendChild(loadingDiv);

            try {
                // Call chat API (mock for now)
                const response = await mockChatAPI(message);

                // Remove loading
                loadingDiv.remove();

                // Add assistant message
                addMessage(response.message, 'assistant');

                // Update emotion (without reloading frame)
                if (response.emotion && response.emotion !== currentEmotion) {
                    setEmotion(response.emotion);
                }

            } catch (error) {
                loadingDiv.remove();
                addMessage('エラーが発生しました: ' + error.message, 'assistant');
            }
        }

        // Call Chat API
        async function mockChatAPI(message) {
            const response = await fetch('/viewer/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    character_id: currentCharacter,
                    mode: currentMode
                })
            });

            if (!response.ok) {
                throw new Error('Chat API error: ' + response.statusText);
            }

            return await response.json();
        }

        // Event listeners
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize
        updateLive2D();
    </script>
</body>
</html>
