[mcp_servers.serena]
args = [
  "--from",
  "/home/nyukimi/serena",
  "serena-mcp-server",
  "--enable-web-dashboard",
  "False",
  "--project-from-cwd"
]
command = "/home/nyukimi/.local/bin/uvx"

  [mcp_servers.serena.env]
  GOCACHE = "/home/nyukimi/RenCrow_CORE/.serena/go-build"
  GOMODCACHE = "/home/nyukimi/RenCrow_CORE/.serena/gomodcache"
  SERENA_HOME = "/home/nyukimi/RenCrow_CORE/.serena"
  UV_CACHE_DIR = "/home/nyukimi/RenCrow_CORE/.serena/uv-cache"
  UV_OFFLINE = "1"
  UV_TOOL_DIR = "/home/nyukimi/RenCrow_CORE/.serena/uv-tools"
  XDG_CACHE_HOME = "/home/nyukimi/RenCrow_CORE/.serena/xdg-cache"

[mcp_servers.aidesigner]
url = "https://api.aidesigner.ai/api/v1/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
